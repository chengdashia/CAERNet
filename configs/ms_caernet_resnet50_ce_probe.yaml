data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 256
  num_workers: 16
  augment: art
model:
  architecture: ms_caernet_resnet50
  pretrained: true
  use_coord_attention: false
  embed_dim: 512
  dropout: 0.1
  attention_reduction: 8
loss:
  energy_lambda: 0.0
  energy_margin: -5.0
  label_smoothing: 0.0
  contrastive_lambda: 0.0
  contrastive_temperature: 0.1
train:
  seed: 42
  device: cuda
  epochs: 60
  batch_size: 128
  grad_accumulation_steps: 1
  lr: 1.0e-04
  min_lr: 1.0e-06
  weight_decay: 0.0005
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 3
  backbone_lr_scale: 0.1
  gradient_clip: 1.0
  mixup_alpha: 0.0
  patience: 12
  amp: true
  compile: false
output:
  run_dir: classify/outputs/runs/A100/ms_caernet_resnet50_ce_probe_b128x1
eval:
  test_each_epoch: true
  test_dir: classify/data/artbench10_paper/test
  tta_horizontal_flip: true
