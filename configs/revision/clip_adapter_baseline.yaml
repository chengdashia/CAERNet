data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 224
  num_workers: 8
  augment: clip_probe
  normalize: clip
model:
  architecture: clip_adapter_baseline
  clip_model_name: ViT-B-16
  clip_pretrained: /home/kmyh/classify/models/open_clip/vit_b16_openai.bin
  prompt_path: classify/CAERNet/configs/prompts/artbench10_clip_adapter.yaml
  adapter_dim: 128
  adapter_ratio: 0.2
  dropout: 0.1
  unfreeze_last_n_blocks: 0
loss:
  energy_lambda: 0.0
  unknown_energy_lambda: 0.0
  label_smoothing: 0.0
  contrastive_lambda: 0.0
train:
  seed: 42
  device: cuda
  epochs: 100
  batch_size: 128
  lr: 0.0003
  min_lr: 0.000003
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  patience: 20
  mixup_alpha: 0.0
  backbone_lr_scale: 0.01
output:
  run_name: revision_clip_adapter_baseline
eval:
  test_each_epoch: false
  test_after_training: true
  test_dir: classify/data/artbench10/test
  tta_horizontal_flip: false
