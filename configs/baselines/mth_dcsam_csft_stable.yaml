data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 256
  num_workers: 16
  augment: art
model:
  architecture: mth_dcsam_csft
  pretrained: false
  use_coord_attention: false
  embed_dim: 256
  transformer_heads: 8
  transformer_layers: 1
  attention_reduction: 8
  attention_kernel: 3
  dropout: 0.2
  reduced_tail: true
loss:
  energy_lambda: 0.0
  energy_margin: -5.0
  label_smoothing: 0.1
  contrastive_lambda: 0.05
  contrastive_temperature: 0.1
train:
  seed: 42
  device: cuda
  epochs: 200
  batch_size: 128
  lr: 0.0001
  min_lr: 5.0e-05
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 10
  backbone_lr_scale: 0.3
  gradient_clip: 1.0
  patience: 30
  amp: true
  compile: false
  grad_accumulation_steps: 1
output:
  run_dir: classify/outputs/runs/A100/mth_dcsam_csft_stable_b128x1_art_lr1e4
