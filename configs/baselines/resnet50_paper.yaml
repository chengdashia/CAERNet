data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 256
  num_workers: 16
  augment: strong
model:
  architecture: resnet50
  pretrained: true
  use_coord_attention: false
  dropout: 0.3
loss:
  energy_lambda: 0.0
  energy_margin: -5.0
  label_smoothing: 0.1
train:
  seed: 42
  device: cuda
  epochs: 200
  batch_size: 256
  lr: 0.0001
  min_lr: 5.0e-05
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 10
  backbone_lr_scale: 0.3
  gradient_clip: 1.0
  mixup_alpha: 0.2
  patience: 30
  amp: true
  compile: false
  grad_accumulation_steps: 1
output:
  run_dir: classify/outputs/runs/A100/baseline_resnet50_paper_b256x1_aug
eval:
  test_each_epoch: true
  test_dir: classify/data/artbench10/test
  tta_horizontal_flip: false
