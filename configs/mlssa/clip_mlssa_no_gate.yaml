data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 224
  num_workers: 8
  augment: art
  normalize: clip
model:
  architecture: clip_mlssa
  clip_model_name: ViT-B-16
  clip_pretrained: /home/kmyh/classify/models/open_clip/vit_b16_openai.bin
  style_layers: [3, 7, 11]
  style_dim: 256
  fusion_hidden_dim: 256
  dropout: 0.1
  include_std: true
  learned_fusion: true
  use_style_gate: false
  unfreeze_last_n_blocks: 2
loss:
  energy_lambda: 0.0
  unknown_energy_lambda: 0.0
  label_smoothing: 0.1
  contrastive_lambda: 0.1
  contrastive_temperature: 0.07
  orthogonality_lambda: 0.05
train:
  seed: 42
  device: cuda
  epochs: 100
  batch_size: 128
  lr: 0.0003
  min_lr: 0.000003
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  patience: 25
  mixup_alpha: 0.2
  backbone_lr_scale: 0.01
output:
  run_name: clip_mlssa_no_gate
eval:
  test_each_epoch: false
  test_after_training: true
  test_dir: classify/data/artbench10/test
  tta_horizontal_flip: false
