data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 224
  num_workers: 8
  augment: art
  normalize: clip
model:
  architecture: clip_linear_probe
  clip_model_name: ViT-B-16
  clip_pretrained: openai
  dropout: 0.0
loss:
  energy_lambda: 0.0
  label_smoothing: 0.1
train:
  seed: 42
  device: cuda
  epochs: 80
  batch_size: 128
  lr: 0.0005
  min_lr: 0.00005
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  patience: 15
  mixup_alpha: 0.0
output:
  run_name: clip_linear_vit_b16
eval:
  test_each_epoch: true
  test_dir: classify/data/artbench10_paper/test
  tta_horizontal_flip: false
