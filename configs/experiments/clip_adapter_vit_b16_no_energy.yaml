data:
  train_dir: classify/data/artbench10/train
  val_dir: classify/data/artbench10_paper/val
  image_size: 224
  num_workers: 8
  augment: clip_probe
  normalize: clip
model:
  architecture: clip_adapter
  clip_model_name: ViT-B-16
  clip_pretrained: openai
  adapter_dim: 512
  dropout: 0.1
loss:
  energy_lambda: 0.0
  unknown_energy_lambda: 0.0
  energy_margin: -5.0
  unknown_energy_margin: -1.0
  label_smoothing: 0.1
  contrastive_lambda: 0.05
  contrastive_temperature: 0.1
train:
  seed: 42
  device: cuda
  epochs: 100
  batch_size: 128
  lr: 0.0003
  min_lr: 0.00003
  weight_decay: 0.001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  amp: true
  patience: 20
  mixup_alpha: 0.0
  pseudo_unknown_mixup_alpha: 0.5
output:
  run_name: clip_adapter_vit_b16_no_energy
eval:
  test_each_epoch: true
  test_dir: classify/data/artbench10/test
  tta_horizontal_flip: false
